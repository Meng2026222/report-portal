<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>价值投资研究报告 · 企业门户</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue','Noto Sans SC',sans-serif;background:#080816;color:#e0e0e0;min-height:100vh}

/* ===== HEADER ===== */
header{background:linear-gradient(135deg,#0a0a2e 0%,#12122a 50%,#080816 100%);padding:20px 16px 28px;text-align:center;border-bottom:1px solid #1a1a3a;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(ellipse at 30% 50%,rgba(240,192,64,0.06) 0%,transparent 70%);pointer-events:none}
.hero-icon{font-size:36px;margin-bottom:6px}
h1{font-size:22px;color:#fff;font-weight:700;letter-spacing:1px}
h1 span{color:#f0c040}
.subtitle{font-size:12px;color:#666;margin-top:4px;letter-spacing:2px}
.stats-bar{display:flex;justify-content:center;gap:20px;margin-top:14px;font-size:11px;color:#555}
.stats-bar span{color:#888}

/* ===== SEARCH BAR ===== */
.search-wrap{padding:16px 16px 0;max-width:720px;margin:0 auto}
.search-box{display:flex;align-items:center;background:#0e0e22;border:1px solid #1e1e3a;border-radius:12px;padding:4px 14px;transition:all 0.25s ease}
.search-box:focus-within{border-color:#f0c04055;box-shadow:0 0 0 3px rgba(240,192,64,0.06)}
.search-box svg{flex-shrink:0;width:18px;height:18px;fill:none;stroke:#555;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-input{flex:1;background:none;border:none;outline:none;color:#ddd;font-size:14px;padding:10px 10px;font-family:inherit}
.search-input::placeholder{color:#444}
.search-clear{background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:4px 6px;display:none;line-height:1}
.search-clear.visible{display:block}
.search-clear:active{color:#888}
.search-hint{font-size:11px;color:#333;margin-top:6px;padding:0 4px}
.search-hint kbd{background:#1a1a3a;color:#666;padding:1px 6px;border-radius:4px;font-size:10px;font-family:inherit}

/* ===== CATALOG ===== */
.catalog{padding:16px;max-width:720px;margin:0 auto}
.catalog h2{font-size:15px;color:#888;margin:8px 0 14px 4px;font-weight:400;letter-spacing:1px}
.card-grid{display:flex;flex-direction:column;gap:14px}
.card{background:linear-gradient(135deg,#12122a 0%,#0e0e22 100%);border-radius:14px;padding:18px;border:1px solid #1e1e3a;cursor:pointer;transition:all 0.25s ease;position:relative;overflow:hidden}
.card:active{transform:scale(0.98);border-color:#f0c04044}
.card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;opacity:0.05;pointer-events:none}
.card-row{display:flex;align-items:flex-start;gap:14px}
.card-score{flex-shrink:0;width:56px;height:56px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.card-score-ring{position:absolute;inset:0;border-radius:50%}
.card-score-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:#0e0e22}
.card-score-num{font-size:18px;font-weight:bold;line-height:1}
.card-score-label{font-size:8px;opacity:0.6;line-height:1.2}
.card-info{flex:1;min-width:0}
.card-name{font-size:17px;font-weight:700;color:#fff;margin-bottom:2px}
.card-desc{font-size:11px;color:#666;margin-bottom:6px;line-height:1.4}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.06);color:#888;border:1px solid rgba(255,255,255,0.06)}
.tag.gold{background:rgba(240,192,64,0.1);color:#f0c040;border-color:rgba(240,192,64,0.15)}
.tag.blue{background:rgba(79,195,247,0.1);color:#4fc3f7;border-color:rgba(79,195,247,0.15)}
.tag.green{background:rgba(76,175,80,0.1);color:#4caf50;border-color:rgba(76,175,80,0.15)}
.card-metrics{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:10px;color:#555}
.card-metrics span{color:#999}

/* ===== REPORT VIEW ===== */
.report-view{display:none;position:fixed;inset:0;z-index:100;background:#080816;flex-direction:column}
.report-view.active{display:flex}
.report-toolbar{display:flex;align-items:center;padding:10px 16px;background:#0a0a1a;border-bottom:1px solid #1a1a3a;gap:10px;flex-shrink:0}
.back-btn{background:none;border:1px solid #333;color:#ccc;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.back-btn:active{background:#1a1a3a}
.report-title-bar{font-size:13px;color:#888;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.report-title-bar span{color:#fff}
.report-frame-wrap{flex:1;position:relative;overflow:hidden}
.report-frame{width:100%;height:100%;border:none}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:13px;flex-direction:column;gap:10px}
.spinner{width:28px;height:28px;border:2px solid #1e1e3a;border-top-color:#f0c040;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== RESPONSIVE ===== */
@media(min-width:600px){
  header{padding:28px 24px 36px}
  h1{font-size:28px}
  .card-grid{gap:16px}
  .card{padding:22px}
  .card-name{font-size:19px}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e1e3a;border-radius:2px}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="hero-icon">📊</div>
  <h1>价值投资 <span>研究门户</span></h1>
  <div class="subtitle">VALUE INVESTING RESEARCH PORTAL</div>
  <div class="stats-bar">
    报告 · <span id="totalReports">0</span> 篇 &nbsp;|&nbsp; 数据 · 恒生聚源数据库
  </div>
</header>

<!-- ===== SEARCH ===== -->
<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索企业名称、行业、标签、指标…" oninput="onSearch(this.value)" autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-hint"><kbd>Ctrl+K</kbd> 快速搜索 · 支持中文/英文</div>
</div>

<!-- ===== CATALOG ===== -->
<div class="catalog" id="catalog">
  <div id="catalogHeader"><h2>📂 企业研究报告</h2></div>
  <div class="card-grid" id="cardGrid"></div>
  <div id="noResults" style="display:none;text-align:center;padding:40px 16px">
    <div style="font-size:40px;margin-bottom:12px">🔍</div>
    <div style="color:#555;font-size:14px">没有找到匹配的报告</div>
    <div style="color:#333;font-size:12px;margin-top:6px">试试其他关键词？</div>
  </div>
</div>

<!-- ===== REPORT VIEW ===== -->
<div class="report-view" id="reportView">
  <div class="report-toolbar">
    <button class="back-btn" onclick="closeReport()">← 返回目录</button>
    <div class="report-title-bar"><span id="reportTitle">报告</span></div>
  </div>
  <div class="report-frame-wrap">
    <div class="loading" id="reportLoading">
      <div class="spinner"></div>
      <span>加载报告中…</span>
    </div>
    <iframe class="report-frame" id="reportFrame" onload="onFrameLoaded()"></iframe>
  </div>
</div>

<script>
// ===== COMPANIES DATA =====
const COMPANIES = [
  {
    id: 'maotai',
    name: '贵州茅台',
    nameEn: 'Kweichow Moutai',
    score: 7.0,
    scoreMax: 10,
    color: '#f0c040',
    industry: '食品饮料 · 白酒',
    desc: '中国高端白酒行业绝对龙头，A股最具代表性的消费类核心资产。',
    tags: ['核心资产', '国酒', '高毛利'],
    metrics: {营收: '1,899亿', 净利: '910亿', 毛利率: '91%+', PE: '20.7x', ROE: '28%', 股息率: '3.2%'},
    file: 'maotai.html',
    type: 'full'
  },
  {
    id: 'zhongjixuchuang',
    name: '中际旭创',
    nameEn: 'Zhongji Innolight',
    score: 7.5,
    scoreMax: 10,
    color: '#4fc3f7',
    industry: '通信 · 光模块',
    desc: '全球光模块行业龙头，AI算力基础设施核心受益者。',
    tags: ['AI算力', '光模块', '出海'],
    metrics: {营收: '258亿', 净利: '58.7亿', 毛利率: '35.8%', PE: '21.5x', ROE: '25%', 净利率: '22.7%'},
    file: 'zhongjixuchuang.html',
    type: 'full'
  }
]

// ===== CATALOG =====
let searchQuery = ''

document.addEventListener('DOMContentLoaded', () => {
  renderCatalog()
})

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('reportView').classList.contains('active')) {
      closeReport()
    } else if (searchQuery) {
      clearSearch()
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault()
    document.getElementById('searchInput').focus()
  }
})

function renderCatalog(query) {
  query = (query || '').toLowerCase().trim()
  const grid = document.getElementById('cardGrid')
  const noRes = document.getElementById('noResults')
  const hdr = document.getElementById('catalogHeader')

  const filtered = query
    ? COMPANIES.filter(c => {
        const searchText = [c.name, c.nameEn, c.industry, c.desc, ...c.tags,
          ...Object.entries(c.metrics).map(([k,v]) => k + ' ' + v)
        ].join(' ').toLowerCase()
        return searchText.includes(query)
      })
    : COMPANIES

  document.getElementById('totalReports').textContent = COMPANIES.length

  grid.innerHTML = filtered.map(c => {
    const pct = (c.score / c.scoreMax * 100).toFixed(0)
    const deg = (pct / 100 * 360).toFixed(0)
    const metKeys = Object.keys(c.metrics)
    const metHTML = metKeys.map(k => `<span>${k}: ${c.metrics[k]}</span>`).join('')
    const tagsHTML = c.tags.map(t =>
      `<span class="tag" style="background:${c.color}15;color:${c.color};border-color:${c.color}20">${t}</span>`
    ).join('')

    return `<div class="card" onclick="openReport('${c.id}')">
      <div class="card-row">
        <div class="card-score">
          <svg class="card-score-ring" viewBox="0 0 36 36">
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#1e1e3a" stroke-width="3"/>
            <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="${c.color}" stroke-width="3" stroke-dasharray="${deg}, 360" stroke-linecap="round"/>
          </svg>
          <div class="card-score-inner">
            <div class="card-score-num" style="color:${c.color}">${c.score}</div>
            <div class="card-score-label">/${c.scoreMax}</div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-name">${c.name}</div>
          <div class="card-desc">${c.industry}</div>
          <div class="card-tags">${tagsHTML}</div>
          <div class="card-metrics">${metHTML}</div>
        </div>
      </div>
    </div>`
  }).join('')

  noRes.style.display = filtered.length === 0 ? 'block' : 'none'
  if (query) {
    hdr.innerHTML = `<h2>📂 搜索结果 · 共 <span style="color:#f0c040">${filtered.length}</span> 篇匹配</h2>`
  } else {
    hdr.innerHTML = `<h2>📂 企业研究报告 · 共 <span style="color:#888">${COMPANIES.length}</span> 篇</h2>`
  }
}

function onSearch(val) {
  searchQuery = val
  document.getElementById('searchClear').classList.toggle('visible', val.length > 0)
  renderCatalog(val)
}

function clearSearch() {
  document.getElementById('searchInput').value = ''
  document.getElementById('searchClear').classList.remove('visible')
  onSearch('')
}

// ===== REPORT VIEW =====
function openReport(id) {
  const c = COMPANIES.find(x => x.id === id)
  if (!c) return
  document.getElementById('reportTitle').innerHTML = `<span>${c.name}</span> · ${c.industry}`
  document.getElementById('reportView').classList.add('active')
  document.getElementById('reportLoading').style.display = 'flex'
  document.getElementById('reportFrame').style.display = 'none'
  document.getElementById('reportFrame').src = 'reports/' + c.file
}

function closeReport() {
  document.getElementById('reportView').classList.remove('active')
  document.getElementById('reportFrame').src = ''
}

function onFrameLoaded() {
  document.getElementById('reportLoading').style.display = 'none'
  document.getElementById('reportFrame').style.display = 'block'
}
</script>
</body>
</html>
